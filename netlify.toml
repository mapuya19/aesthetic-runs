[build]
  base = "apps/frontend"
  publish = ".next"
  command = "pnpm build"

[build.environment]
  # Add other env vars here or in Netlify UI

[[redirects]]
  from = "/api/*"
  to = "https://aesthetic-runs.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
