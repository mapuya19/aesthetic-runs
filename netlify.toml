[build]
  base = "apps/frontend"
  publish = ".next"
  command = "pnpm build"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_API_URL = "https://your-render-backend-url.onrender.com"
  # Add other env vars here or in Netlify UI

[[redirects]]
  from = "/api/*"
  to = "https://your-render-backend-url.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
